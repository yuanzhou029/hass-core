name: Build Core Wheels with Custom Wheels Tool

on:
  workflow_dispatch:
  schedule:
    - cron: "0 4 * * *"
  push:
    branches:
      - dev
      - rc
    paths:
      - ".github/workflows/wheels.yml"
      - "homeassistant/package_constraints.txt"
      - "requirements_all.txt"
      - "requirements.txt"
      - "script/gen_requirements_all.py"
    tags:
      - 'v*'
  release:
    types: [published]
  pull_request:
    branches:
      - main

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref_name}}
  cancel-in-progress: true

jobs:
  init:
    name: Initialize wheels builder
    if: github.repository_owner == 'yuanzhou029'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout the repository
        uses: actions/checkout@v6.0.2
        with:
          persist-credentials: false

      - name: Set up Python
        id: python
        uses: actions/setup-python@v6.2.0
        with:
          python-version-file: ".python-version"
          check-latest: true

      - name: Create Python virtual environment
        run: |
          python -m venv venv
          . venv/bin/activate
          python --version
          pip install "$(grep '^uv' < requirements.txt)" || true
          pip install -r requirements.txt

      - name: Create requirements_diff file
        run: |
          if [[ "${GITHUB_EVENT_NAME}" =~ (schedule|workflow_dispatch) ]]; then
            touch requirements_diff.txt
          else
            curl -s -o requirements_diff.txt https://raw.githubusercontent.com/home-assistant/core/master/requirements.txt
          fi

      - name: Write env-file
        run: |
          (
            echo "GRPC_PYTHON_BUILD_SYSTEM_OPENSSL=true"
            echo "GRPC_PYTHON_BUILD_WITH_CYTHON=true"

            # Fix out of memory issues with rust
            echo "CARGO_NET_GIT_FETCH_WITH_CLI=true"

            # OpenCV headless installation
            echo "CI_BUILD=1"
            echo "ENABLE_HEADLESS=1"

            # Use C-Extension for SQLAlchemy
            echo "REQUIRE_SQLALCHEMY_CEXT=1"
          ) > .env_file

      - name: Upload env_file
        uses: actions/upload-artifact@v7.0.0
        with:
          name: env_file
          path: ./.env_file
          include-hidden-files: true
          overwrite: true

      - name: Upload requirements_diff
        uses: actions/upload-artifact@v7.0.0
        with:
          name: requirements_diff
          path: ./requirements_diff.txt
          overwrite: true

      - name: Generate requirements
        run: |
          . venv/bin/activate
          python -m script.gen_requirements_all ci

      - name: Upload requirements_all_wheels
        uses: actions/upload-artifact@v7.0.0
        with:
          name: requirements_all_wheels
          path: ./requirements_all_wheels_*.txt

  core:
    name: Build Core wheels ${{ matrix.abi }} for ${{ matrix.arch }} (musllinux_1_2)
    if: github.repository_owner == 'yuanzhou029'
    needs: init
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        abi: ["cp314"]
        arch: ["amd64", "aarch64"]
        include:
          - arch: amd64
            os: ubuntu-latest
          - arch: aarch64
            os: ubuntu-24.04-arm
    steps:
      - name: Checkout the repository
        uses: actions/checkout@v6.0.2
        with:
          persist-credentials: false

      - name: Download env_file
        uses: actions/download-artifact@v8.0.0
        with:
          name: env_file

      - name: Download requirements_diff
        uses: actions/download-artifact@v8.0.0
        with:
          name: requirements_diff

      - name: Adjust build env
        run: |
          # Don't build wheels for uv as uv requires a greater version of rust as currently available on alpine
          sed -i "/uv/d" requirements.txt
          sed -i "/uv/d" requirements_diff.txt

      - name: Build wheels
        uses: yuanzhou029/hass-wheels@main  # 您创建的wheels工具
        with:
          abi: ${{ matrix.abi }}
          tag: musllinux_1_2
          arch: ${{ matrix.arch }}
          # 上传到本地路径而非服务器
          local-wheels-repo-path: "/tmp/wheels_output"
          wheels-host: ""
          wheels-user: ""
          # 保持原有配置
          env-file: true
          apk: "libffi-dev;openssl-dev;yaml-dev;nasm;zlib-ng-dev"
          skip-binary: aiohttp;multidict;propcache;yarl;SQLAlchemy
          constraints: "homeassistant/package_constraints.txt"
          requirements-diff: "requirements_diff.txt"
          requirements: "requirements.txt"

      - name: Upload wheels as artifacts
        uses: actions/upload-artifact@v4.3.6
        with:
          name: core-wheels-${{ matrix.arch }}-${{ matrix.abi }}
          path: /tmp/wheels_output/**
          retention-days: 30

  integrations:
    name: Build wheels ${{ matrix.abi }} for ${{ matrix.arch }}
    if: github.repository_owner == 'yuanzhou029'  # 更改为您自己的用户名
    needs: init
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        abi: ["cp314"]
        arch: ["amd64", "aarch64"]
        include:
          - arch: amd64
            os: ubuntu-latest
          - arch: aarch64
            os: ubuntu-24.04-arm
    steps:
      - name: Checkout the repository
        uses: actions/checkout@v6.0.2
        with:
          persist-credentials: false

      - name: Download env_file
        uses: actions/download-artifact@v8.0.0
        with:
          name: env_file

      - name: Download requirements_diff
        uses: actions/download-artifact@v8.0.0
        with:
          name: requirements_diff

      - name: Download requirements_all_wheels
        uses: actions/download-artifact@v8.0.0
        with:
          name: requirements_all_wheels

      - name: Adjust build env
        run: |
          # Do not pin numpy in wheels building
          sed -i "/numpy/d" homeassistant/package_constraints.txt
          # Don't build wheels for uv as uv requires a greater version of rust as currently available on alpine
          sed -i "/uv/d" requirements.txt
          sed -i "/uv/d" requirements_diff.txt

      - name: Build wheels
        uses: yuanzhou029/hass-wheels@main  # 您创建的wheels工具
        with:
          abi: ${{ matrix.abi }}
          tag: musllinux_1_2
          arch: ${{ matrix.arch }}
          # 上传到本地路径而非服务器
          local-wheels-repo-path: "/tmp/wheels_output"
          wheels-host: ""
          wheels-user: ""
          # 保持原有配置
          env-file: true
          apk: "bluez-dev;libffi-dev;openssl-dev;glib-dev;eudev-dev;libxml2-dev;libxslt-dev;libpng-dev;libjpeg-turbo-dev;tiff-dev;gmp-dev;mpfr-dev;mpc1-dev;ffmpeg-dev;yaml-dev;openblas-dev;fftw-dev;lapack-dev;gfortran;blas-dev;eigen-dev;freetype-dev;glew-dev;harfbuzz-dev;hdf5-dev;libdc1394-dev;libtbb-dev;mesa-dev;openexr-dev;openjpeg-dev;uchardet-dev;nasm;zlib-ng-dev"
          skip-binary: aiohttp;charset-normalizer;grpcio;multidict;SQLAlchemy;propcache;protobuf;pymicro-vad;yarl
          constraints: "homeassistant/package_constraints.txt"
          requirements-diff: "requirements_diff.txt"
          requirements: "requirements_all_wheels_${{ matrix.arch }}.txt"

      - name: Upload wheels as artifacts
        uses: actions/upload-artifact@v4.3.6
        with:
          name: integration-wheels-${{ matrix.arch }}-${{ matrix.abi }}
          path: /tmp/wheels_output/**
          retention-days: 30

  build-complete-package:
    name: Build complete Home Assistant package
    if: github.repository_owner == 'yuanzhou029'
    needs: [core, integrations]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v6.2.0
        with:
          python-version-file: ".python-version"

      - name: Download all built wheels
        uses: actions/download-artifact@v8.0.0
        with:
          path: /tmp/all_wheels
          pattern: '*-wheels-*'

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip setuptools wheel build

      - name: Build Home Assistant main package
        run: |
          python -m build --wheel --outdir dist/

      - name: Create complete package with precompiled dependencies
        run: |
          mkdir -p complete_package/dependencies
          
          # Copy the main Home Assistant wheel
          cp dist/homeassistant-*.whl complete_package/
          
          # Flatten and copy all precompiled dependencies
          find /tmp/all_wheels -name "*.whl" -exec cp {} complete_package/dependencies/ \;
          
          # Create installation instructions
          echo "# Home Assistant Complete Installation Package" > complete_package/README_INSTALL.md
          echo "" >> complete_package/README_INSTALL.md
          echo "This package includes:" >> complete_package/README_INSTALL.md
          echo "- Home Assistant main package: $(ls dist/homeassistant-*.whl | xargs basename)" >> complete_package/README_INSTALL.md
          echo "- Precompiled dependencies: $(find complete_package/dependencies -name '*.whl' | wc -l) packages" >> complete_package/README_INSTALL.md
          echo "" >> complete_package/README_INSTALL.md
          echo "## Installation" >> complete_package/README_INSTALL.md
          echo "" >> complete_package/README_INSTALL.md
          echo "Install using pip with precompiled dependencies:" >> complete_package/README_INSTALL.md
          echo "" >> complete_package/README_INSTALL.md
          echo "\`\`\`bash" >> complete_package/README_INSTALL.md
          echo "pip install homeassistant-*.whl \\" >> complete_package/README_INSTALL.md
          echo "    --find-links dependencies/ \\" >> complete_package/README_INSTALL.md
          echo "    --prefer-binary" >> complete_package/README_INSTALL.md
          echo "\`\`\`" >> complete_package/README_INSTALL.md
          echo "" >> complete_package/README_INSTALL.md
          echo "This will use the precompiled wheels instead of compiling from source." >> complete_package/README_INSTALL.md

      - name: Upload complete package
        uses: actions/upload-artifact@v4.3.6
        with:
          name: homeassistant-complete-package
          path: complete_package/
          retention-days: 30

  publish-complete-package:
    name: Publish complete Home Assistant package to GitHub Releases
