name: Build and Publish wheels

# yamllint disable-line rule:truthy
on:
  workflow_dispatch:
    inputs:
      publish:
        description: 'Publish to PyPI (true/false)'
        required: true
        default: 'false'
        type: choice
        options:
          - 'true'
          - 'false'
  schedule:
    - cron: "0 4 * * *"
  push:
    branches:
      - dev
      - rc
    paths:
      - ".github/workflows/wheels.yml"
      - "homeassistant/package_constraints.txt"
      - "requirements_all.txt"
      - "requirements.txt"
      - "script/gen_requirements_all.py"
    tags:
      - 'v*'  # 当推送标签时自动发布
  release:
    types: [published]  # 当发布版本时触发

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  init:
    name: Initialize wheels builder
    if: github.repository_owner == 'yuanzhou029'
    runs-on: ubuntu-latest
    outputs:
      should_publish: ${{ steps.check.outputs.should_publish }}
      python_version: ${{ steps.python.outputs.python-version }}
    steps:
      - name: Checkout the repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Check if should publish
        id: check
        run: |
          if [[ "${{ github.event.inputs.publish }}" == "true" ]] || [[ "${{ github.ref_type }}" == "tag" ]] || [[ "${{ github.event_name }}" == "release" ]]; then
            echo "should_publish=true" >> $GITHUB_OUTPUT
            echo "Will publish to PyPI"
          else
            echo "should_publish=false" >> $GITHUB_OUTPUT
            echo "Will only build wheels"
          fi

      - name: Set up Python
        id: python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version-file: ".python-version"
          check-latest: true

      - name: Create Python virtual environment
        run: |
          python -m venv venv
          . venv/bin/activate
          python --version
          pip install --upgrade pip setuptools wheel
          pip install "$(grep '^uv' < requirements.txt)" || true
          pip install -r requirements.txt

      - name: Create requirements_diff file
        run: |
          if [[ "${GITHUB_EVENT_NAME}" =~ (schedule|workflow_dispatch) ]]; then
            touch requirements_diff.txt
          else
            curl -s -o requirements_diff.txt https://raw.githubusercontent.com/home-assistant/core/master/requirements.txt
          fi

      - name: Write env-file
        run: |
          (
            echo "GRPC_PYTHON_BUILD_SYSTEM_OPENSSL=true"
            echo "GRPC_PYTHON_BUILD_WITH_CYTHON=true"

            # Fix out of memory issues with rust
            echo "CARGO_NET_GIT_FETCH_WITH_CLI=true"

            # OpenCV headless installation
            echo "CI_BUILD=1"
            echo "ENABLE_HEADLESS=1"

            # Use C-Extension for SQLAlchemy
            echo "REQUIRE_SQLALCHEMY_CEXT=1"
          ) > .env_file

      - name: Upload env_file
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: env_file
          path: ./.env_file
          include-hidden-files: true
          overwrite: true

      - name: Upload requirements_diff
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: requirements_diff
          path: ./requirements_diff.txt
          overwrite: true

      - name: Generate requirements
        run: |
          . venv/bin/activate
          python -m script.gen_requirements_all ci

      - name: Upload requirements_all_wheels
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: requirements_all_wheels
          path: ./requirements_all_wheels_*.txt

  build-wheels:
    name: Build wheels for ${{ matrix.os }}-${{ matrix.arch }}
    if: github.repository_owner == 'yuanzhou029'
    needs: init
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        arch: [x86_64, aarch64]
    steps:
      - name: Checkout the repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Download env_file
        uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3 # v8.0.0
        with:
          name: env_file

      - name: Download requirements_diff
        uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3 # v8.0.0
        with:
          name: requirements_diff

      - name: Download requirements_all_wheels
        uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3 # v8.0.0
        with:
          name: requirements_all_wheels

      - name: Set up QEMU for cross-platform builds
        if: matrix.arch != 'x86_64'
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Load environment variables
        run: |
          source .env_file
          export $(cut -d= -f1 .env_file)

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version-file: ".python-version"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            bluez-dev \
            libffi-dev \
            libssl-dev \
            glib-dev \
            eudev-dev \
            libxml2-dev \
            libxslt1-dev \
            libpng-dev \
            libjpeg-dev \
            libtiff-dev \
            libgmp-dev \
            libmpfr-dev \
            libmpc-dev \
            ffmpeg \
            libavformat-dev \
            libavcodec-dev \
            libavdevice-dev \
            libavutil-dev \
            libswscale-dev \
            libswresample-dev \
            libavfilter-dev \
            yaml-dev \
            openblas-dev \
            fftw3-dev \
            liblapack-dev \
            gfortran \
            libblas-dev \
            eigen-dev \
            libfreetype6-dev \
            libglew-dev \
            libharfbuzz-dev \
            libhdf5-dev \
            libdc1394-dev \
            libtbb-dev \
            mesa-common-dev \
            libopenexr-dev \
            libopenjp2-7-dev \
            libuchardet-dev \
            nasm \
            zlib1g-dev \
            pkg-config \
            gcc-aarch64-linux-gnu \
            libc6-dev-arm64-cross \
            musl-tools

      - name: Install Python build tools
        run: |
          python -m pip install --upgrade pip setuptools wheel build twine cibuildwheel==2.22.0

      - name: Prepare build configuration
        run: |
          # Copy the main project files to ensure we can build the wheel
          cp -r . ../source_project
          cd ../source_project
          
          # Create temporary requirements file for building
          if [ -f "requirements_all_wheels_amd64.txt" ]; then
            cp requirements_all_wheels_amd64.txt temp_requirements.txt
          elif [ -f "requirements_all_wheels_aarch64.txt" ]; then
            cp requirements_all_wheels_aarch64.txt temp_requirements.txt
          else
            cp requirements.txt temp_requirements.txt
          fi

      - name: Build wheels using cibuildwheel
        run: |
          export CIBW_BUILD_VERBOSITY=1
          export CIBW_ARCHS_LINUX=${{ matrix.arch }}
          export CIBW_BUILD="cp314-*"
          export CIBW_SKIP="pp* *-win32 *_i686 *-musllinux_*"
          export CIBW_MANYLINUX_X86_64_IMAGE=manylinux_2_28
          export CIBW_MANYLINUX_AARCH64_IMAGE=manylinux_2_28
          
          # Set environment variables for the build
          export $(grep -v '^#' .env_file | xargs)
          
          # Build the wheels
          python -m cibuildwheel --output-dir dist .
        env:
          CIBW_ENVIRONMENT_PASS_LINUX: "GRPC_PYTHON_BUILD_SYSTEM_OPENSSL GRPC_PYTHON_BUILD_WITH_CYTHON CI_BUILD ENABLE_HEADLESS REQUIRE_SQLALCHEMY_CEXT"
          CIBW_BEFORE_BUILD_LINUX: "pip install --upgrade pip setuptools wheel"

      - name: List built wheels
        run: |
          if [ -d dist ] && [ -n "$(ls -A dist/)" ]; then
            echo "Built wheels:"
            ls -la dist/
          else
            echo "No wheels were built, checking current directory..."
            ls -la *.whl || echo "No wheels found"
          fi

      - name: Upload wheels artifacts
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: wheels-${{ matrix.arch }}
          path: |
            dist/*.whl
            *.whl
          retention-days: 7

  collect-and-publish:
    name: Collect wheels and publish
    if: needs.init.outputs.should_publish == 'true'
    needs: [init, build-wheels]
    runs-on: ubuntu-latest
    environment: pypi  # 使用环境配置
    steps:
      - name: Create dist directory
        run: mkdir -p dist

      - name: Download all wheels
        uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3 # v8.0.0
        with:
          pattern: wheels-*
          path: temp_wheels/

      - name: Combine all wheels
        run: |
          # Find and copy all wheel files from different architectures
          find temp_wheels/ -name "*.whl" -type f -exec cp {} dist/ \;
          echo "Found $(ls dist/*.whl | wc -l) wheels to publish"

      - name: Display wheels to publish
        run: |
          echo "Wheels to publish:"
          ls -la dist/
          echo "Total wheels: $(ls dist/*.whl | wc -l)"

      - name: Verify wheels
        run: |
          pip install twine
          twine check dist/*.whl

      - name: Publish to PyPI using API token
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
          password: ${{ secrets.PYPI_API_TOKEN }}

  create-github-release:
    name: Create GitHub Release
    needs: [init, build-wheels]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Create dist directory
        run: mkdir -p dist

      - name: Download all wheels
        uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3 # v8.0.0
        with:
          pattern: wheels-*
          path: temp_wheels/

      - name: Combine all wheels for release
        run: |
          # Find and copy all wheel files from different architectures
          find temp_wheels/ -name "*.whl" -type f -exec cp {} dist/ \;

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.whl
          draft: false
          prerelease: false
          generate_release_notes: true
