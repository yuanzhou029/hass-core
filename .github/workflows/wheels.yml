# yaml-lint disable-line rule:truthy
name: Build wheels

on:
  workflow_dispatch:
  schedule:
    - cron: "0 4 * * *"
  push:
    branches:
      - dev
      - rc
    paths:
      - ".github/workflows/wheels.yml"
      - "homeassistant/package_constraints.txt"
      - "requirements_all.txt"
      - "requirements.txt"
      - "script/gen_requirements_all.py"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref_name}}
  cancel-in-progress: true

jobs:
  init:
    name: Initialize wheels builder
    if: github.repository_owner == 'yuanzhou029'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout the repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up Python
        id: python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version-file: ".python-version"
          check-latest: true

      - name: Create Python virtual environment
        run: |
          python -m venv venv
          . venv/bin/activate
          python --version
          pip install "$(grep '^uv' < requirements.txt)"
          uv pip install -r requirements.txt

      - name: Create requirements_diff file
        run: |
          if [[ "${GITHUB_EVENT_NAME}" =~ (schedule|workflow_dispatch) ]]; then
            touch requirements_diff.txt
          else
            curl -s -o requirements_diff.txt https://raw.githubusercontent.com/yuanzhou029/hass-core/main/requirements.txt
          fi

      - name: Write env-file
        run: |
          (
            echo "GRPC_PYTHON_BUILD_SYSTEM_OPENSSL=true"
            echo "GRPC_PYTHON_BUILD_WITH_CYTHON=true"
            echo "CARGO_NET_GIT_FETCH_WITH_CLI=true"
            echo "CI_BUILD=1"
            echo "ENABLE_HEADLESS=1"
            echo "REQUIRE_SQLALCHEMY_CEXT=1"
          ) > .env_file

      - name: Upload env_file
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: env_file
          path: ./.env_file
          include-hidden-files: true
          overwrite: true

      - name: Upload requirements_diff
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: requirements_diff
          path: ./requirements_diff.txt
          overwrite: true

      - name: Generate requirements
        run: |
          . venv/bin/activate
          python -m script.gen_requirements_all ci

      - name: Upload requirements_all_wheels
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: requirements_all_wheels
          path: ./requirements_all_wheels_*.txt

  core:
    name: Build Core wheels ${{ matrix.abi }} for ${{ matrix.arch }}
    if: github.repository_owner == 'yuanzhou029'
    needs: init
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        abi: ["cp314"]
        arch: ["amd64", "aarch64"]
        include:
          - arch: amd64
            os: ubuntu-latest
          - arch: aarch64
            os: ubuntu-24.04-arm
    steps:
      - name: Checkout the repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Download env_file
        uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3 # v8.0.0
        with:
          name: env_file

      - name: Download requirements_diff
        uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3 # v8.0.0
        with:
          name: requirements_diff

      - name: Adjust build env
        run: |
          sed -i "/uv/d" requirements.txt
          sed -i "/uv/d" requirements_diff.txt
          rm -rf build/ dist/ *.egg-info homeassistant.egg-info/
          find . -type d -name __pycache__ -exec rm -rf {} + 2>/dev/null || true

      - name: Build Core wheels
        env:
          GRPC_PYTHON_BUILD_SYSTEM_OPENSSL: "true"
          GRPC_PYTHON_BUILD_WITH_CYTHON: "true"
          CARGO_NET_GIT_FETCH_WITH_CLI: "true"
          CI_BUILD: "1"
          ENABLE_HEADLESS: "1"
          REQUIRE_SQLALCHEMY_CEXT: "1"
        run: |
          python -m pip install --upgrade pip build "setuptools>=75.1.0" "wheel>=0.43.0" "twine>=5.0.0"
          mkdir -p dist
          
          PACKAGES_TO_BUILD="ciso8601 cryptography Pillow orjson PyTurboJPEG zeroconf"
          for package in $PACKAGES_TO_BUILD; do
            PACKAGE_LINE=$(grep "^$package==" requirements.txt | head -n 1)
            if [ -n "$PACKAGE_LINE" ]; then
              echo "Building wheel for $PACKAGE_LINE"
              pip wheel --wheel-dir dist --no-deps "$PACKAGE_LINE" || echo "Failed to build $package, skipping..."
            else
              echo "Building wheel for $package (latest version)"
              pip wheel --wheel-dir dist --no-deps "$package" || echo "Failed to build $package, skipping..."
            fi
          done
          
          echo "Core wheel building completed."
          ls -la dist/ || echo "No wheels built"

      - name: Upload Core wheels to PyPI
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: |
          if [ -n "$(ls dist/*.whl 2>/dev/null)" ]; then
            echo "Uploading core wheels for ${{ matrix.arch }} to PyPI..."
            python -m twine upload --skip-existing dist/*.whl || true
            echo "Successfully uploaded core wheels to PyPI."
          else
            echo "No core wheel files found in dist/ to upload to PyPI."
          fi

  integrations:
    name: Build Integration wheels ${{ matrix.abi }} for ${{ matrix.arch }}
    if: github.repository_owner == 'yuanzhou029'
    needs: init
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        abi: ["cp314"]
        arch: ["amd64", "aarch64"]
        include:
          - arch: amd64
            os: ubuntu-latest
          - arch: aarch64
            os: ubuntu-24.04-arm
    steps:
      - name: Checkout the repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Download env_file
        uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3 # v8.0.0
        with:
          name: env_file

      - name: Download requirements_diff
        uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3 # v8.0.0
        with:
          name: requirements_diff

      - name: Download requirements_all_wheels
        uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3 # v8.0.0
        with:
          name: requirements_all_wheels

      - name: Adjust build env
        run: |
          sed -i "/numpy/d" homeassistant/package_constraints.txt
          sed -i "/uv/d" requirements.txt
          sed -i "/uv/d" requirements_diff.txt
          rm -rf build/ dist/ *.egg-info homeassistant.egg-info/
          find . -type d -name __pycache__ -exec rm -rf {} + 2>/dev/null || true

      - name: Build Integration wheels
        env:
          GRPC_PYTHON_BUILD_SYSTEM_OPENSSL: "true"
          GRPC_PYTHON_BUILD_WITH_CYTHON: "true"
          CARGO_NET_GIT_FETCH_WITH_CLI: "true"
          CI_BUILD: "1"
          ENABLE_HEADLESS: "1"
          REQUIRE_SQLALCHEMY_CEXT: "1"
        run: |
          python -m pip install --upgrade pip build "setuptools>=75.1.0" "wheel>=0.43.0" "twine>=5.0.0"
          mkdir -p dist
          
          if [ "${{ matrix.arch }}" = "amd64" ]; then
            REQ_FILE="requirements_all_wheels_amd64.txt"
          else
            REQ_FILE="requirements_all_wheels_aarch64.txt"
          fi
          
          if [ -f "$REQ_FILE" ]; then
            echo "Using requirements file: $REQ_FILE"
            while IFS= read -r line; do
              [[ "$line" =~ ^[[:space:]]*# ]] && continue
              [[ -z "$line" ]] && continue
              if [[ "$line" =~ ^[a-zA-Z] ]]; then
                echo "Building wheel for: $line"
                pip wheel --wheel-dir dist --no-deps "$line" || echo "Failed to build $line, skipping..."
              fi
            done < "$REQ_FILE"
          else
            echo "Requirements file $REQ_FILE not found, building common integration packages"
            PACKAGES_TO_BUILD="pybluez ffmpeg-python pytz requests-oauthlib"
            for package in $PACKAGES_TO_BUILD; do
              echo "Building wheel for $package"
              pip wheel --wheel-dir dist --no-deps "$package" || echo "Failed to build $package, skipping..."
            done
          fi
          
          echo "Integration wheel building completed."
          ls -la dist/ || echo "No wheels built"

      - name: Upload Integration wheels to PyPI
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: |
          if [ -n "$(ls dist/*.whl 2>/dev/null)" ]; then
            echo "Uploading integration wheels for ${{ matrix.arch }} to PyPI..."
            python -m twine upload --skip-existing dist/*.whl || true
            echo "Successfully uploaded integration wheels to PyPI."
          else
            echo "No integration wheel files found in dist/ to upload to PyPI."
          fi
